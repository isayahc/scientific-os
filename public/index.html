<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OpenAI Agent Chat</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: Inter, system-ui, sans-serif;
        background: #0b1020;
        color: #e5eefc;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background:
          radial-gradient(circle at top, #1f315e 0%, transparent 35%),
          linear-gradient(180deg, #0b1020 0%, #070b16 100%);
      }

      .shell {
        width: min(900px, 100%);
        margin: 0 auto;
        padding: 24px 16px 40px;
      }

      .panel {
        background: rgba(7, 11, 22, 0.75);
        border: 1px solid rgba(148, 163, 184, 0.2);
        border-radius: 24px;
        overflow: hidden;
        box-shadow: 0 30px 80px rgba(0, 0, 0, 0.35);
        backdrop-filter: blur(18px);
      }

      .header {
        padding: 24px;
        border-bottom: 1px solid rgba(148, 163, 184, 0.16);
      }

      .header h1 {
        margin: 0 0 8px;
        font-size: clamp(1.8rem, 4vw, 2.8rem);
      }

      .header p {
        margin: 0;
        color: #9fb0d1;
      }

      #messages {
        display: grid;
        gap: 12px;
        padding: 24px;
        min-height: 55vh;
      }

      .message {
        max-width: 80%;
        padding: 14px 16px;
        border-radius: 18px;
        white-space: pre-wrap;
        line-height: 1.5;
      }

      .message.user {
        justify-self: end;
        background: linear-gradient(135deg, #2563eb, #7c3aed);
      }

      .message.assistant {
        justify-self: start;
        background: rgba(30, 41, 59, 0.92);
        border: 1px solid rgba(148, 163, 184, 0.18);
      }

      .message h3 {
        margin: 0 0 8px;
        font-size: 0.95rem;
        color: #7dd3fc;
      }

      .message p,
      .message ul,
      .message article {
        margin: 0;
      }

      .message section + section {
        margin-top: 14px;
        padding-top: 14px;
        border-top: 1px solid rgba(148, 163, 184, 0.12);
      }

      .message ul,
      .message ol {
        padding-left: 18px;
      }

      .message li + li,
      .message article + article,
      .message article p + p,
      .message article p + a,
      .message article a + p {
        margin-top: 6px;
      }

      .message a {
        color: #7dd3fc;
      }

      .composer {
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 12px;
        padding: 0 24px 24px;
      }

      textarea {
        width: 100%;
        min-height: 60px;
        max-height: 180px;
        resize: vertical;
        padding: 16px;
        border-radius: 16px;
        border: 1px solid rgba(148, 163, 184, 0.2);
        background: rgba(15, 23, 42, 0.9);
        color: inherit;
        font: inherit;
      }

      button {
        align-self: end;
        height: 60px;
        padding: 0 20px;
        border: 0;
        border-radius: 16px;
        background: #38bdf8;
        color: #03111d;
        font: inherit;
        font-weight: 700;
        cursor: pointer;
      }

      button:disabled {
        opacity: 0.6;
        cursor: wait;
      }

      @media (max-width: 640px) {
        .composer {
          grid-template-columns: 1fr;
        }

        .message {
          max-width: 100%;
        }

        button {
          width: 100%;
        }
      }
    </style>
  </head>
  <body>
    <main class="shell">
      <section class="panel">
        <header class="header">
          <h1>Agent SDK Chat</h1>
          <p>Minimal boilerplate: browser chat UI + Express backend + OpenAI Agents SDK.</p>
        </header>

        <section id="messages"></section>

        <form id="chat-form" class="composer">
          <textarea id="prompt" placeholder="Ask a science question..." required></textarea>
          <button id="send" type="submit">Send</button>
        </form>
      </section>
    </main>

    <script type="module" src="/app.js"></script>
  </body>
</html>
