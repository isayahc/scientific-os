<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OpenAI Agent Chat</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: Inter, system-ui, sans-serif;
        background: #0b1020;
        color: #e5eefc;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background:
          radial-gradient(circle at top, #1f315e 0%, transparent 35%),
          linear-gradient(180deg, #0b1020 0%, #070b16 100%);
      }

      .shell {
        width: min(1280px, 100%);
        margin: 0 auto;
        padding: 24px 16px 40px;
      }

      .layout {
        display: grid;
        grid-template-columns: 320px minmax(0, 1fr);
        gap: 16px;
        align-items: start;
      }

      .panel {
        background: rgba(7, 11, 22, 0.75);
        border: 1px solid rgba(148, 163, 184, 0.2);
        border-radius: 24px;
        overflow: hidden;
        box-shadow: 0 30px 80px rgba(0, 0, 0, 0.35);
        backdrop-filter: blur(18px);
      }

      .sidebar {
        padding: 20px;
        max-height: calc(100vh - 64px);
        overflow: auto;
      }

      .sidebar h2 {
        margin: 0 0 8px;
        font-size: 1rem;
      }

      .sidebar-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        margin-bottom: 8px;
      }

      .sidebar-head h2 {
        margin: 0;
      }

      .sidebar p {
        margin: 0 0 16px;
        color: #9fb0d1;
      }

      .sidebar-action {
        height: auto;
        padding: 10px 12px;
        border-radius: 12px;
        background: rgba(56, 189, 248, 0.18);
        color: #e5eefc;
        border: 1px solid rgba(56, 189, 248, 0.3);
      }

      .protocol-list {
        display: grid;
        gap: 10px;
        min-width: 0;
      }

      .protocol-item {
        width: 100%;
        padding: 12px;
        border-radius: 16px;
        border: 1px solid rgba(148, 163, 184, 0.18);
        background: rgba(15, 23, 42, 0.9);
        color: inherit;
        text-align: left;
        cursor: pointer;
        overflow: hidden;
      }

      .protocol-item[aria-pressed="true"] {
        border-color: rgba(56, 189, 248, 0.75);
        box-shadow: inset 0 0 0 1px rgba(56, 189, 248, 0.45);
      }

      .protocol-item strong,
      .protocol-item small,
      .protocol-item p {
        display: block;
      }

      .protocol-item small {
        margin-top: 4px;
        color: #7dd3fc;
      }

      .protocol-item p {
        margin: 8px 0 0;
        color: #c9d7ee;
        font-size: 0.92rem;
      }

      .protocol-item strong,
      .protocol-item small,
      .protocol-item p,
      .message,
      .message p,
      .message li,
      .message a {
        overflow-wrap: anywhere;
        word-break: break-word;
      }

      .header {
        padding: 24px;
        border-bottom: 1px solid rgba(148, 163, 184, 0.16);
      }

      .header h1 {
        margin: 0 0 8px;
        font-size: clamp(1.8rem, 4vw, 2.8rem);
      }

      .header p {
        margin: 0;
        color: #9fb0d1;
      }

      #messages {
        display: grid;
        gap: 12px;
        padding: 24px;
        min-height: 55vh;
        max-height: 65vh;
        overflow: auto;
        min-width: 0;
      }

      .message {
        max-width: 80%;
        padding: 14px 16px;
        border-radius: 18px;
        white-space: pre-wrap;
        line-height: 1.5;
        min-width: 0;
        overflow: hidden;
      }

      .message.user {
        justify-self: end;
        background: linear-gradient(135deg, #2563eb, #7c3aed);
      }

      .message.assistant {
        justify-self: start;
        background: rgba(30, 41, 59, 0.92);
        border: 1px solid rgba(148, 163, 184, 0.18);
      }

      .loading-message {
        display: inline-flex;
        align-items: center;
        gap: 10px;
      }

      .spinner {
        width: 16px;
        height: 16px;
        border-radius: 999px;
        border: 2px solid rgba(125, 211, 252, 0.25);
        border-top-color: #7dd3fc;
        animation: spin 0.8s linear infinite;
        flex: 0 0 auto;
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      .message h3 {
        margin: 0 0 8px;
        font-size: 0.95rem;
        color: #7dd3fc;
      }

      .message p,
      .message ul,
      .message article {
        margin: 0;
      }

      .message section + section {
        margin-top: 14px;
        padding-top: 14px;
        border-top: 1px solid rgba(148, 163, 184, 0.12);
      }

      .message ul,
      .message ol {
        padding-left: 18px;
      }

      .message li + li,
      .message article + article,
      .message article p + p,
      .message article p + a,
      .message article a + p {
        margin-top: 6px;
      }

      .message a {
        color: #7dd3fc;
      }

      .composer {
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 12px;
        padding: 0 24px 24px;
      }

      textarea {
        width: 100%;
        min-height: 60px;
        max-height: 180px;
        resize: vertical;
        padding: 16px;
        border-radius: 16px;
        border: 1px solid rgba(148, 163, 184, 0.2);
        background: rgba(15, 23, 42, 0.9);
        color: inherit;
        font: inherit;
      }

      button {
        align-self: end;
        height: 60px;
        padding: 0 20px;
        border: 0;
        border-radius: 16px;
        background: #38bdf8;
        color: #03111d;
        font: inherit;
        font-weight: 700;
        cursor: pointer;
      }

      button:disabled {
        opacity: 0.6;
        cursor: wait;
      }

      @media (max-width: 640px) {
        .layout {
          grid-template-columns: 1fr;
        }

        .composer {
          grid-template-columns: 1fr;
        }

        .message {
          max-width: 100%;
        }

        button {
          width: 100%;
        }
      }
    </style>
  </head>
  <body>
    <main class="shell">
      <section class="layout">
        <aside class="panel sidebar">
          <div class="sidebar-head">
            <h2>Conversations</h2>
            <button id="new-chat" class="sidebar-action" type="button">New Chat</button>
          </div>
          <p>Saved protocol conversations appear here.</p>
          <section id="protocol-list" class="protocol-list"></section>
        </aside>

        <section class="panel">
          <header class="header">
            <h1>Agent SDK Chat</h1>
            <p>Minimal boilerplate: browser chat UI + Express backend + OpenAI Agents SDK.</p>
          </header>

          <section id="messages"></section>

          <form id="chat-form" class="composer">
            <textarea id="prompt" placeholder="Ask a science question..." required></textarea>
            <button id="send" type="submit">Send</button>
          </form>
        </section>
      </section>
    </main>

    <script type="module" src="/app.js"></script>
  </body>
</html>
